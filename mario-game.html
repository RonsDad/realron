<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Courier New', monospace;
        }

        .game-container {
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }

        canvas {
            display: block;
            background: linear-gradient(to bottom, #87CEEB 0%, #98D8E8 100%);
            border: 3px solid #333;
        }

        .game-ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            user-select: none;
        }

        .controls {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 14px;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 24px;
            display: none;
            text-align: center;
        }

        .game-over.show {
            display: block;
        }

        .restart-btn {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .restart-btn:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="game-ui">
            <div>Score: <span id="score">0</span></div>
            <div>Lives: <span id="lives">3</span></div>
            <div>Level: <span id="level">1</span></div>
        </div>
        <div class="controls">
            Use Arrow Keys or WASD to move, SPACE to jump
        </div>
        <div class="game-over" id="gameOver">
            <div id="gameOverText">Game Over!</div>
            <button class="restart-btn" onclick="restartGame()">Restart</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 400;

        // Game constants
        const GRAVITY = 0.5;
        const FRICTION = 0.8;
        const JUMP_FORCE = -12;

        // Input handler
        class InputHandler {
            constructor() {
                this.keys = {};
                
                window.addEventListener('keydown', (e) => {
                    this.keys[e.key.toLowerCase()] = true;
                });
                
                window.addEventListener('keyup', (e) => {
                    this.keys[e.key.toLowerCase()] = false;
                });
            }

            isPressed(key) {
                return this.keys[key] || false;
            }
        }

        // Particle system for effects
        class Particle {
            constructor(x, y, vx, vy, color, life = 30) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.life = life;
                this.maxLife = life;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2;
                this.life--;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life / this.maxLife;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, 4, 4);
                ctx.restore();
            }
        }

        // Player (Mario) class
        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 30;
                this.height = 40;
                this.vx = 0;
                this.vy = 0;
                this.speed = 5;
                this.jumpPower = JUMP_FORCE;
                this.grounded = false;
                this.color = '#FF0000';
                this.facing = 1; // 1 for right, -1 for left
                this.invulnerable = false;
                this.invulnerableTime = 0;
            }

            update(input, platforms) {
                // Handle input
                if (input.isPressed('arrowleft') || input.isPressed('a')) {
                    this.vx = -this.speed;
                    this.facing = -1;
                } else if (input.isPressed('arrowright') || input.isPressed('d')) {
                    this.vx = this.speed;
                    this.facing = 1;
                } else {
                    this.vx *= FRICTION;
                }

                if ((input.isPressed(' ') || input.isPressed('arrowup') || input.isPressed('w')) && this.grounded) {
                    this.vy = this.jumpPower;
                    this.grounded = false;
                }

                // Apply physics
                this.vy += GRAVITY;
                this.x += this.vx;
                this.y += this.vy;

                // Check platform collisions
                this.grounded = false;
                for (let platform of platforms) {
                    if (this.checkCollision(platform)) {
                        this.resolveCollision(platform);
                    }
                }

                // Keep player in bounds
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;
                if (this.y > canvas.height) {
                    this.respawn();
                }

                // Update invulnerability
                if (this.invulnerable) {
                    this.invulnerableTime--;
                    if (this.invulnerableTime <= 0) {
                        this.invulnerable = false;
                    }
                }
            }

            checkCollision(obj) {
                return this.x < obj.x + obj.width &&
                       this.x + this.width > obj.x &&
                       this.y < obj.y + obj.height &&
                       this.y + this.height > obj.y;
            }

            resolveCollision(platform) {
                // Calculate overlap on each axis
                const overlapX = Math.min(this.x + this.width - platform.x, platform.x + platform.width - this.x);
                const overlapY = Math.min(this.y + this.height - platform.y, platform.y + platform.height - this.y);

                // Resolve collision based on smallest overlap
                if (overlapX < overlapY) {
                    // Horizontal collision
                    if (this.x < platform.x) {
                        this.x = platform.x - this.width;
                    } else {
                        this.x = platform.x + platform.width;
                    }
                    this.vx = 0;
                } else {
                    // Vertical collision
                    if (this.y < platform.y) {
                        this.y = platform.y - this.height;
                        this.grounded = true;
                        this.vy = 0;
                    } else {
                        this.y = platform.y + platform.height;
                        this.vy = 0;
                    }
                }
            }

            takeDamage() {
                if (!this.invulnerable) {
                    this.invulnerable = true;
                    this.invulnerableTime = 120; // 2 seconds at 60fps
                    return true;
                }
                return false;
            }

            respawn() {
                this.x = 50;
                this.y = 200;
                this.vx = 0;
                this.vy = 0;
            }

            draw(ctx) {
                ctx.save();
                
                // Flash when invulnerable
                if (this.invulnerable && Math.floor(this.invulnerableTime / 5) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }

                // Draw body
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y + 10, this.width, this.height - 10);
                
                // Draw head
                ctx.fillStyle = '#FDB863';
                ctx.fillRect(this.x + 5, this.y, this.width - 10, 15);
                
                // Draw cap
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x + 2, this.y - 5, this.width - 4, 10);
                
                // Draw eyes
                ctx.fillStyle = '#000';
                if (this.facing === 1) {
                    ctx.fillRect(this.x + 18, this.y + 5, 3, 3);
                } else {
                    ctx.fillRect(this.x + 9, this.y + 5, 3, 3);
                }
                
                ctx.restore();
            }
        }

        // Enemy (Goomba) class
        class Enemy {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 30;
                this.height = 30;
                this.vx = -1;
                this.vy = 0;
                this.color = '#8B4513';
                this.isDead = false;
            }

            update(platforms) {
                // Apply gravity
                this.vy += GRAVITY;
                this.x += this.vx;
                this.y += this.vy;

                // Check platform collisions
                for (let platform of platforms) {
                    if (this.checkCollision(platform)) {
                        this.resolveCollision(platform);
                    }
                }

                // Reverse direction at canvas edges
                if (this.x <= 0 || this.x + this.width >= canvas.width) {
                    this.vx *= -1;
                }

                // Remove if fallen off screen
                if (this.y > canvas.height) {
                    this.isDead = true;
                }
            }

            checkCollision(obj) {
                return this.x < obj.x + obj.width &&
                       this.x + this.width > obj.x &&
                       this.y < obj.y + obj.height &&
                       this.y + this.height > obj.y;
            }

            resolveCollision(platform) {
                const overlapX = Math.min(this.x + this.width - platform.x, platform.x + platform.width - this.x);
                const overlapY = Math.min(this.y + this.height - platform.y, platform.y + platform.height - this.y);

                if (overlapX < overlapY) {
                    // Horizontal collision - reverse direction
                    this.vx *= -1;
                    if (this.x < platform.x) {
                        this.x = platform.x - this.width;
                    } else {
                        this.x = platform.x + platform.width;
                    }
                } else {
                    // Vertical collision
                    if (this.y < platform.y) {
                        this.y = platform.y - this.height;
                        this.vy = 0;
                    } else {
                        this.y = platform.y + platform.height;
                        this.vy = 0;
                    }
                }
            }

            draw(ctx) {
                // Draw goomba body
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y + 5, this.width, this.height - 5);
                
                // Draw mushroom cap
                ctx.beginPath();
                ctx.arc(this.x + this.width/2, this.y + 10, this.width/2, Math.PI, 0);
                ctx.fillStyle = '#A0522D';
                ctx.fill();
                
                // Draw eyes
                ctx.fillStyle = '#FFF';
                ctx.fillRect(this.x + 8, this.y + 12, 5, 5);
                ctx.fillRect(this.x + 17, this.y + 12, 5, 5);
                ctx.fillStyle = '#000';
                ctx.fillRect(this.x + 9, this.y + 13, 3, 3);
                ctx.fillRect(this.x + 18, this.y + 13, 3, 3);
            }
        }

        // Coin class
        class Coin {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 20;
                this.height = 20;
                this.collected = false;
                this.rotation = 0;
                this.bobOffset = Math.random() * Math.PI * 2;
            }

            update() {
                this.rotation += 0.1;
            }

            draw(ctx) {
                if (this.collected) return;
                
                ctx.save();
                ctx.translate(this.x + this.width/2, this.y + this.height/2 + Math.sin(Date.now() / 200 + this.bobOffset) * 3);
                ctx.scale(Math.cos(this.rotation), 1);
                
                // Draw coin
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(0, 0, this.width/2, 0, Math.PI * 2);
                ctx.fill();
                
                // Draw inner circle
                ctx.fillStyle = '#FFA500';
                ctx.beginPath();
                ctx.arc(0, 0, this.width/3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }

        // Platform class
        class Platform {
            constructor(x, y, width, height, type = 'normal') {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.type = type;
                this.color = type === 'ground' ? '#8B4513' : '#4CAF50';
            }

            draw(ctx) {
                if (this.type === 'ground') {
                    // Draw ground with texture
                    ctx.fillStyle = '#654321';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                    
                    // Draw grass on top
                    ctx.fillStyle = '#228B22';
                    ctx.fillRect(this.x, this.y, this.width, 10);
                } else {
                    // Draw brick pattern
                    ctx.fillStyle = '#8B4513';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                    
                    ctx.strokeStyle = '#654321';
                    ctx.lineWidth = 2;
                    
                    // Draw brick lines
                    for (let i = 0; i < this.width; i += 40) {
                        ctx.beginPath();
                        ctx.moveTo(this.x + i, this.y);
                        ctx.lineTo(this.x + i, this.y + this.height);
                        ctx.stroke();
                    }
                    
                    for (let j = 0; j < this.height; j += 20) {
                        ctx.beginPath();
                        ctx.moveTo(this.x, this.y + j);
                        ctx.lineTo(this.x + this.width, this.y + j);
                        ctx.stroke();
                    }
                }
            }
        }

        // Power-up class
        class PowerUp {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.width = 25;
                this.height = 25;
                this.type = type; // 'mushroom' or 'star'
                this.collected = false;
                this.vy = 0;
            }

            update(platforms) {
                if (this.collected) return;
                
                // Apply gravity
                this.vy += GRAVITY * 0.3;
                this.y += this.vy;
                
                // Check platform collisions
                for (let platform of platforms) {
                    if (this.checkCollision(platform)) {
                        this.y = platform.y - this.height;
                        this.vy = 0;
                    }
                }
            }

            checkCollision(obj) {
                return this.x < obj.x + obj.width &&
                       this.x + this.width > obj.x &&
                       this.y < obj.y + obj.height &&
                       this.y + this.height > obj.y;
            }

            draw(ctx) {
                if (this.collected) return;
                
                if (this.type === 'mushroom') {
                    // Draw mushroom
                    ctx.fillStyle = '#FF0000';
                    ctx.fillRect(this.x + 5, this.y, 15, 10);
                    ctx.fillStyle = '#FFF';
                    ctx.fillRect(this.x + 8, this.y + 2, 3, 3);
                    ctx.fillRect(this.x + 14, this.y + 2, 3, 3);
                    ctx.fillRect(this.x + 11, this.y + 5, 3, 3);
                    ctx.fillStyle = '#FFF';
                    ctx.fillRect(this.x + 10, this.y + 10, 5, 15);
                } else if (this.type === 'star') {
                    // Draw star
                    ctx.save();
                    ctx.translate(this.x + this.width/2, this.y + this.height/2);
                    ctx.rotate(Date.now() / 100);
                    ctx.fillStyle = '#FFD700';
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                        const x = Math.cos(angle) * 12;
                        const y = Math.sin(angle) * 12;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                }
            }
        }

        // Game class
        class Game {
            constructor() {
                this.input = new InputHandler();
                this.player = new Player(50, 200);
                this.enemies = [];
                this.coins = [];
                this.platforms = [];
                this.powerUps = [];
                this.particles = [];
                this.score = 0;
                this.lives = 3;
                this.level = 1;
                this.gameOver = false;
                this.camera = { x: 0, y: 0 };
                
                this.initLevel();
            }

            initLevel() {
                // Clear arrays
                this.enemies = [];
                this.coins = [];
                this.platforms = [];
                this.powerUps = [];
                this.particles = [];
                
                // Create level based on current level number
                if (this.level === 1) {
                    this.createLevel1();
                } else {
                    this.createProceduralLevel();
                }
            }

            createLevel1() {
                // Ground
                this.platforms.push(new Platform(0, 360, 800, 40, 'ground'));
                
                // Platforms
                this.platforms.push(new Platform(200, 280, 100, 20));
                this.platforms.push(new Platform(400, 220, 100, 20));
                this.platforms.push(new Platform(550, 280, 80, 20));
                this.platforms.push(new Platform(100, 180, 80, 20));
                this.platforms.push(new Platform(650, 150, 100, 20));
                
                // Enemies
                this.enemies.push(new Enemy(300, 200));
                this.enemies.push(new Enemy(500, 100));
                this.enemies.push(new Enemy(700, 300));
                
                // Coins
                for (let i = 0; i < 5; i++) {
                    this.coins.push(new Coin(220 + i * 25, 240));
                }
                for (let i = 0; i < 3; i++) {
                    this.coins.push(new Coin(420 + i * 25, 180));
                }
                this.coins.push(new Coin(120, 140));
                this.coins.push(new Coin(680, 110));
                
                // Power-ups
                this.powerUps.push(new PowerUp(450, 100, 'mushroom'));
                this.powerUps.push(new PowerUp(700, 100, 'star'));
            }

            createProceduralLevel() {
                // Ground
                this.platforms.push(new Platform(0, 360, 800, 40, 'ground'));
                
                // Generate random platforms
                for (let i = 0; i < 5 + this.level; i++) {
                    const x = Math.random() * 700 + 50;
                    const y = Math.random() * 150 + 150;
                    const width = Math.random() * 100 + 60;
                    this.platforms.push(new Platform(x, y, width, 20));
                }
                
                // Generate enemies
                for (let i = 0; i < 2 + this.level; i++) {
                    this.enemies.push(new Enemy(Math.random() * 700 + 50, 100));
                }
                
                // Generate coins
                for (let i = 0; i < 8 + this.level * 2; i++) {
                    this.coins.push(new Coin(Math.random() * 750 + 25, Math.random() * 200 + 100));
                }
                
                // Generate power-ups
                if (Math.random() > 0.5) {
                    this.powerUps.push(new PowerUp(Math.random() * 700 + 50, 50, 'mushroom'));
                }
                if (Math.random() > 0.7) {
                    this.powerUps.push(new PowerUp(Math.random() * 700 + 50, 50, 'star'));
                }
            }

            update() {
                if (this.gameOver) return;
                
                // Update player
                this.player.update(this.input, this.platforms);
                
                // Update enemies
                for (let enemy of this.enemies) {
                    enemy.update(this.platforms);
                    
                    // Check collision with player
                    if (this.player.checkCollision(enemy) && !enemy.isDead) {
                        // Check if player is jumping on enemy
                        if (this.player.vy > 0 && this.player.y < enemy.y) {
                            // Stomp enemy
                            enemy.isDead = true;
                            this.player.vy = -8;
                            this.score += 100;
                            this.createParticles(enemy.x + enemy.width/2, enemy.y, '#8B4513');
                        } else if (this.player.takeDamage()) {
                            // Player takes damage
                            this.lives--;
                            this.createParticles(this.player.x + this.player.width/2, this.player.y, '#FF0000');
                            if (this.lives <= 0) {
                                this.endGame();
                            }
                        }
                    }
                }
                
                // Remove dead enemies
                this.enemies = this.enemies.filter(enemy => !enemy.isDead);
                
                // Update coins
                for (let coin of this.coins) {
                    if (!coin.collected) {
                        coin.update();
                        if (this.player.checkCollision(coin)) {
                            coin.collected = true;
                            this.score += 10;
                            this.createParticles(coin.x + coin.width/2, coin.y, '#FFD700');
                        }
                    }
                }
                
                // Update power-ups
                for (let powerUp of this.powerUps) {
                    if (!powerUp.collected) {
                        powerUp.update(this.platforms);
                        if (this.player.checkCollision(powerUp)) {
                            powerUp.collected = true;
                            if (powerUp.type === 'mushroom') {
                                this.player.color = '#0000FF';
                                this.score += 50;
                                this.lives = Math.min(this.lives + 1, 5);
                            } else if (powerUp.type === 'star') {
                                this.player.invulnerable = true;
                                this.player.invulnerableTime = 300;
                                this.score += 100;
                            }
                            this.createParticles(powerUp.x + powerUp.width/2, powerUp.y, '#FFD700');
                        }
                    }
                }
                
                // Update particles
                for (let particle of this.particles) {
                    particle.update();
                }
                this.particles = this.particles.filter(p => p.life > 0);
                
                // Check level completion
                if (this.coins.every(coin => coin.collected) && this.enemies.length === 0) {
                    this.nextLevel();
                }
                
                // Update UI
                document.getElementById('score').textContent = this.score;
                document.getElementById('lives').textContent = this.lives;
                document.getElementById('level').textContent = this.level;
            }

            createParticles(x, y, color) {
                for (let i = 0; i < 10; i++) {
                    const angle = (Math.PI * 2 * i) / 10;
                    const speed = Math.random() * 3 + 1;
                    this.particles.push(new Particle(
                        x, y,
                        Math.cos(angle) * speed,
                        Math.sin(angle) * speed - 2,
                        color
                    ));
                }
            }

            nextLevel() {
                this.level++;
                this.player.respawn();
                this.initLevel();
                this.score += 500;
            }

            endGame() {
                this.gameOver = true;
                document.getElementById('gameOver').classList.add('show');
                document.getElementById('gameOverText').textContent = `Game Over! Final Score: ${this.score}`;
            }

            draw() {
                // Clear canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Draw sky gradient
                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, '#87CEEB');
                gradient.addColorStop(1, '#98D8E8');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw clouds
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                for (let i = 0; i < 3; i++) {
                    const x = (i * 250 + Date.now() / 100) % (canvas.width + 100) - 50;
                    const y = 50 + i * 30;
                    this.drawCloud(x, y);
                }
                
                // Draw platforms
                for (let platform of this.platforms) {
                    platform.draw(ctx);
                }
                
                // Draw coins
                for (let coin of this.coins) {
                    coin.draw(ctx);
                }
                
                // Draw power-ups
                for (let powerUp of this.powerUps) {
                    powerUp.draw(ctx);
                }
                
                // Draw enemies
                for (let enemy of this.enemies) {
                    enemy.draw(ctx);
                }
                
                // Draw player
                this.player.draw(ctx);
                
                // Draw particles
                for (let particle of this.particles) {
                    particle.draw(ctx);
                }
            }

            drawCloud(x, y) {
                ctx.beginPath();
                ctx.arc(x, y, 25, 0, Math.PI * 2);
                ctx.arc(x + 25, y, 35, 0, Math.PI * 2);
                ctx.arc(x + 50, y, 25, 0, Math.PI * 2);
                ctx.fill();
            }

            run() {
                this.update();
                this.draw();
                if (!this.gameOver) {
                    requestAnimationFrame(() => this.run());
                }
            }
        }

        // Initialize and start game
        let game = new Game();

        function restartGame() {
            document.getElementById('gameOver').classList.remove('show');
            game = new Game();
            game.run();
        }

        // Start the game loop
        game.run();
    </script>
</body>
</html>
