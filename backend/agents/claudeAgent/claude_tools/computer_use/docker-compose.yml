version: '3.8'

services:
  claude-computer-use:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-computer-use
    env_file:
      - ../../../../.env  # Path to your root .env file
    environment:
      - DISPLAY=:1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MONGO_URI=${MONGO_URI:-mongodb://host.docker.internal:27017/}
    volumes:
      # Mount the entire computer_use directory
      - .:/home/claude/computer_use:ro
      # Screenshots directory
      - ./screenshots:/tmp/claude_screenshots
      # Shared directory for file exchange
      - ./shared:/home/claude/shared
    ports:
      - "5900:5900"  # VNC port
      - "6080:6080"  # NoVNC web port
    networks:
      - claude-net
    security_opt:
      - seccomp:unconfined  # Needed for some X11 operations
    shm_size: '2gb'  # Shared memory for Chrome/Firefox

networks:
  claude-net:
    driver: bridge