<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Care Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            text-align: center;
        }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 2px solid #e0e0e0;
        }
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: transparent;
            border: none;
            color: #666;
            font-size: 14px;
            transition: all 0.3s;
        }
        .tab.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
            margin-bottom: -2px;
        }
        .content { padding: 20px; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #555;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e5e5e5;
            border-radius: 8px;
            font-size: 15px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .input-group input { flex: 1; }
        .unit {
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
            color: #666;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3); }
        .checkbox-group { display: flex; flex-direction: column; gap: 10px; }
        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            cursor: pointer;
        }
        .checkbox-item input {
            width: auto;
            margin-right: 10px;
            width: 18px;
            height: 18px;
        }
        .checkbox-item label { margin: 0; cursor: pointer; }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value { font-size: 28px; font-weight: bold; }
        .stat-label { font-size: 12px; opacity: 0.9; margin-top: 5px; }
        .record {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .record-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .record-date { color: #667eea; font-weight: 600; }
        .record-details { display: flex; flex-wrap: wrap; gap: 8px; }
        .badge {
            background: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            border: 1px solid #e0e0e0;
        }
        .glucose-badge { background: #667eea; color: white; }
        .med-badge { background: #28a745; color: white; }
        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            margin-top: 8px;
        }
        .success {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        .success.show { display: block; }
        .empty { text-align: center; padding: 30px; color: #999; }
        @media (max-width: 480px) {
            .stats { grid-template-columns: 1fr; }
            .tabs { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🩺 Diabetes Care Tracker</h1>
            <p>Track blood sugar & medications easily</p>
        </div>
        <div class="tabs">
            <button class="tab active" onclick="switchTab(0)">📊 Blood Sugar</button>
            <button class="tab" onclick="switchTab(1)">💊 Medications</button>
            <button class="tab" onclick="switchTab(2)">📋 History</button>
        </div>
        <div class="content">
            <div id="success" class="success">✅ Saved successfully!</div>

            <div class="tab-panel active">
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value" id="today-count">0</div>
                        <div class="stat-label">Today's Readings</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="avg-glucose">--</div>
                        <div class="stat-label">7-Day Average</div>
                    </div>
                </div>
                <form id="glucose-form">
                    <div class="form-group">
                        <label>Blood Sugar Level</label>
                        <div class="input-group">
                            <input type="number" id="glucose" placeholder="Enter reading" required min="20" max="600">
                            <span class="unit">mg/dL</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>When did you check?</label>
                        <select id="glucose-time" required>
                            <option value="">Select time</option>
                            <option value="Before Breakfast">Before Breakfast</option>
                            <option value="After Breakfast">After Breakfast</option>
                            <option value="Before Lunch">Before Lunch</option>
                            <option value="After Lunch">After Lunch</option>
                            <option value="Before Dinner">Before Dinner</option>
                            <option value="After Dinner">After Dinner</option>
                            <option value="Bedtime">Bedtime</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Notes (optional)</label>
                        <textarea id="glucose-notes" rows="2" placeholder="How are you feeling?"></textarea>
                    </div>
                    <button type="submit" class="btn">Save Reading</button>
                </form>
            </div>

            <div class="tab-panel">
                <form id="med-form">
                    <div class="form-group">
                        <label>Which medications did you take?</label>
                        <div class="checkbox-group">
                            <div class="checkbox-item">
                                <input type="checkbox" id="med1" value="Glipizide 5mg">
                                <label for="med1">Glipizide 5mg</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="med2" value="Metformin 500mg">
                                <label for="med2">Metformin 500mg</label>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>When?</label>
                        <select id="med-time" required>
                            <option value="">Select time</option>
                            <option value="Morning">Morning</option>
                            <option value="Afternoon">Afternoon</option>
                            <option value="Evening">Evening</option>
                            <option value="Bedtime">Bedtime</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Side effects? (optional)</label>
                        <textarea id="med-notes" rows="2" placeholder="Any concerns?"></textarea>
                    </div>
                    <button type="submit" class="btn">Log Medications</button>
                </form>
            </div>

            <div class="tab-panel">
                <div id="history">
                    <div class="empty">No entries yet. Start tracking!</div>
                </div>
            </div>
        </div>
    </div>
    <script>
        let glucoseData = JSON.parse(localStorage.getItem('glucoseData')) || [];
        let medData = JSON.parse(localStorage.getItem('medData')) || [];

        function switchTab(index) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', i === index);
            });
            document.querySelectorAll('.tab-panel').forEach((p, i) => {
                p.classList.toggle('active', i === index);
            });
            if (index === 2) showHistory();
        }

        function showSuccess() {
            const msg = document.getElementById('success');
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 3000);
        }

        function updateStats() {
            const today = new Date().toDateString();
            const todayCount = glucoseData.filter(r => new Date(r.time).toDateString() === today).length;
            document.getElementById('today-count').textContent = todayCount;

            const week = Date.now() - 7 * 24 * 60 * 60 * 1000;
            const weekData = glucoseData.filter(r => new Date(r.time) > week);
            if (weekData.length) {
                const avg = Math.round(weekData.reduce((a, r) => a + r.value, 0) / weekData.length);
                document.getElementById('avg-glucose').textContent = avg;
            }
        }

        document.getElementById('glucose-form').addEventListener('submit', e => {
            e.preventDefault();
            glucoseData.unshift({
                id: Date.now(),
                value: parseInt(document.getElementById('glucose').value),
                when: document.getElementById('glucose-time').value,
                notes: document.getElementById('glucose-notes').value,
                time: new Date().toISOString()
            });
            localStorage.setItem('glucoseData', JSON.stringify(glucoseData));
            e.target.reset();
            showSuccess();
            updateStats();
        });

        document.getElementById('med-form').addEventListener('submit', e => {
            e.preventDefault();
            const meds = [];
            document.querySelectorAll('.checkbox-group input:checked').forEach(cb => {
                meds.push(cb.value);
            });
            if (!meds.length) {
                alert('Please select at least one medication');
                return;
            }
            medData.unshift({
                id: Date.now(),
                meds: meds,
                when: document.getElementById('med-time').value,
                notes: document.getElementById('med-notes').value,
                time: new Date().toISOString()
            });
            localStorage.setItem('medData', JSON.stringify(medData));
            e.target.reset();
            showSuccess();
        });

        function showHistory() {
            const all = [...glucoseData, ...medData].sort((a, b) =>
                new Date(b.time) - new Date(a.time)
            ).slice(0, 10);

            const historyEl = document.getElementById('history');
            if (!all.length) {
                historyEl.innerHTML = '<div class="empty">No entries yet. Start tracking!</div>';
                return;
            }

            historyEl.innerHTML = all.map(r => {
                const date = new Date(r.time);
                const dateStr = date.toLocaleDateString();
                const timeStr = date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                if (r.value !== undefined) {
                    return `<div class="record">
                        <div class="record-header">
                            <span class="record-date">${dateStr}</span>
                            <span>${timeStr}</span>
                        </div>
                        <div class="record-details">
                            <span class="badge glucose-badge">🩸 ${r.value} mg/dL</span>
                            <span class="badge">${r.when}</span>
                            ${r.notes ? `<span class="badge">📝 ${r.notes}</span>` : ''}
                        </div>
                        <button onclick="deleteItem('glucose', ${r.id})" class="delete-btn">Delete</button>
                    </div>`;
                } else {
                    return `<div class="record">
                        <div class="record-header">
                            <span class="record-date">${dateStr}</span>
                            <span>${timeStr}</span>
                        </div>
                        <div class="record-details">
                            ${r.meds.map(m => `<span class="badge med-badge">💊 ${m}</span>`).join('')}
                            <span class="badge">${r.when}</span>
                            ${r.notes ? `<span class="badge">📝 ${r.notes}</span>` : ''}
                        </div>
                        <button onclick="deleteItem('med', ${r.id})" class="delete-btn">Delete</button>
                    </div>`;
                }
            }).join('');
        }

        function deleteItem(type, id) {
            if (confirm('Delete this entry?')) {
                if (type === 'glucose') {
                    glucoseData = glucoseData.filter(r => r.id !== id);
                    localStorage.setItem('glucoseData', JSON.stringify(glucoseData));
                } else {
                    medData = medData.filter(r => r.id !== id);
                    localStorage.setItem('medData', JSON.stringify(medData));
                }
                showHistory();
                updateStats();
            }
        }

        updateStats();
    </script>
</body>
</html>
