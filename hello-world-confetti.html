<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Confetti Celebration!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            color: white;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
            animation: bounce 2s ease-in-out infinite;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .button-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .confetti-btn {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
        }

        .confetti-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .party-btn {
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white;
        }

        .party-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .stop-btn {
            background: linear-gradient(45deg, #8e44ad, #c0392b);
            color: white;
        }

        .stop-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f0f0f0;
            animation: fall linear;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.2rem;
            margin-bottom: 30px;
            animation: fadeIn 2s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .emoji {
            font-size: 2rem;
            display: inline-block;
            animation: rotate 2s linear infinite;
            margin: 0 10px;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .counter {
            margin-top: 20px;
            color: white;
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
            backdrop-filter: blur(10px);
        }

        @media (max-width: 768px) {
            .button-container {
                flex-direction: column;
                align-items: center;
            }

            button {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello World!</h1>
        <p class="subtitle">
            <span class="emoji">🎉</span>
            Welcome to the Party Zone!
            <span class="emoji">🎊</span>
        </p>
        
        <div class="button-container">
            <button class="confetti-btn" onclick="createConfetti()">
                🎆 More Confetti!
            </button>
            <button class="party-btn" onclick="startPartyMode()">
                🎭 Party Mode
            </button>
            <button class="stop-btn" onclick="stopParty()">
                🛑 Stop Party
            </button>
        </div>
        
        <div class="counter">
            Confetti Pieces: <span id="confettiCount">0</span>
        </div>
    </div>

    <script>
        let confettiCount = 0;
        let partyInterval = null;
        let isPartyMode = false;

        // Array of confetti colors
        const colors = [
            '#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff',
            '#5f27cd', '#00d2d3', '#ffdd59', '#ff6348', '#30336b',
            '#f368e0', '#ffeaa7', '#74b9ff', '#a29bfe', '#fd79a8',
            '#fdcb6e', '#e17055', '#d63031', '#e84393', '#00b894'
        ];

        // Function to create a single confetti piece
        function createSingleConfetti() {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            
            // Random properties
            const size = Math.random() * 15 + 5;
            const left = Math.random() * 100;
            const animationDuration = Math.random() * 3 + 2;
            const backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            const shape = Math.random() > 0.5 ? '50%' : '0%';
            
            // Apply styles
            confetti.style.width = `${size}px`;
            confetti.style.height = `${size}px`;
            confetti.style.left = `${left}%`;
            confetti.style.backgroundColor = backgroundColor;
            confetti.style.borderRadius = shape;
            confetti.style.animationDuration = `${animationDuration}s`;
            confetti.style.top = '-20px';
            
            // Add to body
            document.body.appendChild(confetti);
            confettiCount++;
            updateCounter();
            
            // Remove after animation
            setTimeout(() => {
                confetti.remove();
                confettiCount--;
                updateCounter();
            }, animationDuration * 1000);
        }

        // Create multiple confetti pieces
        function createConfetti() {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    createSingleConfetti();
                }, i * 50);
            }
        }

        // Start party mode (continuous confetti)
        function startPartyMode() {
            if (!isPartyMode) {
                isPartyMode = true;
                createConfetti(); // Initial burst
                partyInterval = setInterval(() => {
                    for (let i = 0; i < 5; i++) {
                        createSingleConfetti();
                    }
                }, 200);
                
                // Change background gradient for party mode
                document.body.style.background = 'linear-gradient(135deg, #ff006e, #8338ec, #3a86ff, #06ffa5, #ffbe0b)';
                document.body.style.backgroundSize = '400% 400%';
                document.body.style.animation = 'gradientShift 5s ease infinite';
                
                // Add CSS animation for gradient shift
                if (!document.getElementById('partyStyles')) {
                    const style = document.createElement('style');
                    style.id = 'partyStyles';
                    style.textContent = `
                        @keyframes gradientShift {
                            0% { background-position: 0% 50%; }
                            50% { background-position: 100% 50%; }
                            100% { background-position: 0% 50%; }
                        }
                    `;
                    document.head.appendChild(style);
                }
            }
        }

        // Stop party mode
        function stopParty() {
            if (isPartyMode) {
                isPartyMode = false;
                if (partyInterval) {
                    clearInterval(partyInterval);
                    partyInterval = null;
                }
                
                // Reset background
                document.body.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                document.body.style.animation = '';
                
                // Remove all existing confetti
                const allConfetti = document.querySelectorAll('.confetti');
                allConfetti.forEach(c => c.remove());
                confettiCount = 0;
                updateCounter();
            }
        }

        // Update confetti counter
        function updateCounter() {
            document.getElementById('confettiCount').textContent = confettiCount;
        }

        // Initial confetti burst on page load
        window.addEventListener('load', () => {
            setTimeout(() => {
                createConfetti();
            }, 500);
        });

        // Add keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'c') {
                createConfetti();
            } else if (e.key.toLowerCase() === 'p') {
                startPartyMode();
            } else if (e.key.toLowerCase() === 's') {
                stopParty();
            }
        });

        // Add click anywhere to create confetti at mouse position
        document.addEventListener('click', (e) => {
            // Don't trigger on button clicks
            if (e.target.tagName !== 'BUTTON') {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                
                const size = Math.random() * 15 + 5;
                const backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                const shape = Math.random() > 0.5 ? '50%' : '0%';
                const animationDuration = Math.random() * 3 + 2;
                
                confetti.style.width = `${size}px`;
                confetti.style.height = `${size}px`;
                confetti.style.left = `${e.clientX}px`;
                confetti.style.top = `${e.clientY}px`;
                confetti.style.backgroundColor = backgroundColor;
                confetti.style.borderRadius = shape;
                confetti.style.animationDuration = `${animationDuration}s`;
                confetti.style.position = 'fixed';
                
                document.body.appendChild(confetti);
                confettiCount++;
                updateCounter();
                
                setTimeout(() => {
                    confetti.remove();
                    confettiCount--;
                    updateCounter();
                }, animationDuration * 1000);
            }
        });
    </script>
</body>
</html>
