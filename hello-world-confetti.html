<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Confetti Celebration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #faa7e0 75%, #f5576c 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 800;
            color: white;
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.5),
                0 0 20px rgba(255, 255, 255, 0.3),
                0 0 30px rgba(255, 255, 255, 0.2),
                4px 4px 8px rgba(0, 0, 0, 0.2);
            letter-spacing: -0.02em;
            animation: fadeInUp 1.5s ease-out, pulse 2s ease-in-out infinite alternate;
            margin-bottom: 1rem;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            from {
                transform: scale(1);
            }
            to {
                transform: scale(1.05);
            }
        }

        .subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: rgba(255, 255, 255, 0.9);
            font-weight: 300;
            letter-spacing: 0.1em;
            animation: fadeIn 2s ease-out 0.5s both;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .sparkle {
            position: fixed;
            pointer-events: none;
            animation: sparkle 1s ease-out forwards;
            z-index: 15;
        }

        @keyframes sparkle {
            0% {
                transform: scale(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: scale(2) rotate(180deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 3rem;
            }
            .subtitle {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    
    <div class="container">
        <h1>Hello World</h1>
        <p class="subtitle">Welcome to the Celebration</p>
    </div>

    <script>
        // Confetti Animation
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Confetti particle class
        class Confetti {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -10;
                this.width = Math.random() * 10 + 5;
                this.height = Math.random() * 5 + 3;
                this.velocity = {
                    x: Math.random() * 4 - 2,
                    y: Math.random() * 2 + 3
                };
                this.angle = Math.random() * 360;
                this.angleVelocity = Math.random() * 10 - 5;
                this.color = this.getRandomColor();
                this.opacity = 1;
                this.fadeRate = Math.random() * 0.002 + 0.001;
                this.gravity = 0.1;
                this.terminalVelocity = 8;
                this.swing = Math.random() * 2 - 1;
                this.swingSpeed = Math.random() * 0.01 + 0.003;
                this.time = 0;
            }

            getRandomColor() {
                const colors = [
                    '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8',
                    '#FFD93D', '#6BCF7F', '#E056FD', '#FDA7DF', '#C44569',
                    '#F8B195', '#F67280', '#355C7D', '#FFC0CB', '#00CEC9',
                    '#74B9FF', '#A29BFE', '#FD79A8', '#FDCB6E', '#6C5CE7'
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                // Physics
                this.velocity.y += this.gravity;
                if (this.velocity.y > this.terminalVelocity) {
                    this.velocity.y = this.terminalVelocity;
                }

                // Swinging motion
                this.time += this.swingSpeed;
                this.velocity.x = Math.sin(this.time) * this.swing * 2;

                // Update position
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.angle += this.angleVelocity;

                // Fade out when reaching bottom
                if (this.y > canvas.height * 0.7) {
                    this.opacity -= this.fadeRate * 3;
                }

                // Reset if out of bounds
                if (this.y > canvas.height + 10 || this.opacity <= 0) {
                    this.reset();
                }
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -10;
                this.velocity.y = Math.random() * 2 + 3;
                this.opacity = 1;
                this.angle = Math.random() * 360;
                this.time = 0;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                
                // Draw confetti with gradient
                const gradient = ctx.createLinearGradient(0, 0, this.width, this.height);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, this.adjustBrightness(this.color, -20));
                
                ctx.fillStyle = gradient;
                ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
                
                // Add shine effect
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(-this.width / 2, -this.height / 2, this.width * 0.3, this.height);
                
                ctx.restore();
            }

            adjustBrightness(color, amount) {
                const num = parseInt(color.replace('#', ''), 16);
                const r = Math.max(0, Math.min(255, (num >> 16) + amount));
                const g = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amount));
                const b = Math.max(0, Math.min(255, (num & 0x0000FF) + amount));
                return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
            }
        }

        // Create confetti particles
        const confettiParticles = [];
        const particleCount = 150;

        for (let i = 0; i < particleCount; i++) {
            setTimeout(() => {
                confettiParticles.push(new Confetti());
            }, i * 50);
        }

        // Animation loop
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            confettiParticles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            requestAnimationFrame(animate);
        }
        
        animate();

        // Add sparkle effect on mouse move
        document.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.9) {
                createSparkle(e.clientX, e.clientY);
            }
        });

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.innerHTML = '✨';
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            sparkle.style.fontSize = Math.random() * 20 + 10 + 'px';
            document.body.appendChild(sparkle);
            
            setTimeout(() => {
                sparkle.remove();
            }, 1000);
        }

        // Add initial burst of confetti
        setTimeout(() => {
            for (let i = 0; i < 50; i++) {
                confettiParticles.push(new Confetti());
            }
        }, 500);
    </script>
</body>
</html>
