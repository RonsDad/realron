<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Symptom Tracker - Healthcare Tool</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    padding: 20px;
}
.container {
    max-width: 900px;
    margin: 0 auto;
    background: white;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.header {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    padding: 30px;
    text-align: center;
    border-radius: 20px 20px 0 0;
}
.tabs {
    display: flex;
    background: #f8f9fa;
    border-bottom: 2px solid #e9ecef;
}
.tab {
    flex: 1;
    padding: 15px;
    cursor: pointer;
    border: none;
    background: none;
    font-weight: 500;
    color: #666;
    transition: all 0.3s;
}
.tab.active {
    color: #667eea;
    background: white;
    border-bottom: 3px solid #667eea;
}
.content { padding: 30px; }
.page { display: none; }
.page.active { display: block; }
.form-group { margin-bottom: 20px; }
.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #495057;
}
.form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 12px;
    border: 2px solid #e9ecef;
    border-radius: 8px;
    font-size: 1em;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none;
    border-color: #667eea;
}
.severity {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
}
.sev-btn {
    padding: 15px;
    border: 2px solid #e9ecef;
    border-radius: 8px;
    cursor: pointer;
    text-align: center;
    transition: all 0.3s;
}
.sev-btn:hover { transform: scale(1.05); }
.sev-btn.active {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border-color: #667eea;
}
.btn {
    padding: 12px 30px;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    transition: all 0.3s;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.4); }
.entry {
    background: #f8f9fa;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 15px;
    cursor: pointer;
    transition: all 0.3s;
}
.entry:hover { transform: translateX(5px); }
.badge {
    display: inline-block;
    padding: 5px 15px;
    border-radius: 20px;
    color: white;
    font-size: 0.9em;
}
.mild { background: #28a745; }
.mod { background: #ffc107; }
.sev { background: #dc3545; }
.stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 20px;
    margin: 30px 0;
}
.stat {
    background: #f8f9fa;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}
.stat-val {
    font-size: 2em;
    font-weight: bold;
    color: #667eea;
    margin: 10px 0;
}
.chart {
    display: flex;
    align-items: flex-end;
    height: 150px;
    gap: 5px;
    background: #f8f9fa;
    padding: 20px;
    border-radius: 12px;
}
.bar {
    flex: 1;
    background: linear-gradient(to top, #667eea, #764ba2);
    border-radius: 4px 4px 0 0;
}
.msg {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #28a745;
    color: white;
    padding: 15px 25px;
    border-radius: 8px;
    display: none;
}
@media (max-width: 768px) {
    .severity { grid-template-columns: repeat(2, 1fr); }
    .stats { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏥 Symptom Tracker</h1>
        <p>Log and monitor your symptoms</p>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="showPage('log')">📝 Log</button>
        <button class="tab" onclick="showPage('history')">📊 History</button>
        <button class="tab" onclick="showPage('trends')">📈 Trends</button>
        <button class="tab" onclick="showPage('export')">💾 Export</button>
    </div>

    <div class="content">
        <div id="log" class="page active">
            <h2>Log Your Symptoms</h2>
            <form id="symptomForm">
                <div class="form-group">
                    <label>Date & Time</label>
                    <input type="datetime-local" id="dt" required>
                </div>
                <div class="form-group">
                    <label>Symptom</label>
                    <select id="symptom" required>
                        <option value="">Select...</option>
                        <option value="Fatigue">Fatigue</option>
                        <option value="Pain">Pain</option>
                        <option value="Headache">Headache</option>
                        <option value="Nausea">Nausea</option>
                        <option value="Dizziness">Dizziness</option>
                        <option value="Anxiety">Anxiety</option>
                        <option value="Insomnia">Sleep Issues</option>
                        <option value="Brain Fog">Brain Fog</option>
                        <option value="Digestive">Digestive Issues</option>
                        <option value="Joint Pain">Joint Pain</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Severity (1-10)</label>
                    <div class="severity" id="severity">
                        <div class="sev-btn" data-val="2">1-2<br>Mild</div>
                        <div class="sev-btn" data-val="4">3-4<br>Moderate</div>
                        <div class="sev-btn" data-val="6">5-6<br>Significant</div>
                        <div class="sev-btn" data-val="8">7-8<br>Severe</div>
                        <div class="sev-btn" data-val="10">9-10<br>Extreme</div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Location (optional)</label>
                    <input type="text" id="location" placeholder="e.g., lower back, head">
                </div>
                <div class="form-group">
                    <label>Notes (optional)</label>
                    <textarea id="notes" rows="3" placeholder="Additional details..."></textarea>
                </div>
                <button type="submit" class="btn">Save Entry</button>
            </form>
        </div>

        <div id="history" class="page">
            <h2>History</h2>
            <div id="entries"></div>
        </div>

        <div id="trends" class="page">
            <h2>Trends & Analytics</h2>
            <div class="stats">
                <div class="stat">
                    <div>Entries</div>
                    <div class="stat-val" id="total">0</div>
                </div>
                <div class="stat">
                    <div>Avg Severity</div>
                    <div class="stat-val" id="avg">0</div>
                </div>
                <div class="stat">
                    <div>Days</div>
                    <div class="stat-val" id="days">0</div>
                </div>
            </div>
            <h3>Last 7 Days</h3>
            <div class="chart" id="chart"></div>
        </div>

        <div id="export" class="page">
            <h2>Export Data</h2>
            <p style="margin:20px 0;color:#6c757d">Download your symptom data to share with your healthcare provider.</p>
            <div style="display:flex;gap:15px;flex-wrap:wrap">
                <button class="btn" onclick="exportCSV()">📊 Download CSV</button>
                <button class="btn" onclick="exportJSON()">💾 Download JSON</button>
                <button class="btn" onclick="printData()">🖨️ Print Report</button>
            </div>
            <div id="report" style="margin-top:30px"></div>
        </div>
    </div>
</div>

<div id="msg" class="msg">✓ Saved!</div>

<script>
let data = JSON.parse(localStorage.getItem('symptoms')) || [];
let severity = 5;

// Init
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('dt').value = new Date().toISOString().slice(0,16);

    // Severity buttons
    document.querySelectorAll('.sev-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.sev-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            severity = parseInt(btn.dataset.val);
        };
    });

    // Form submit
    document.getElementById('symptomForm').onsubmit = (e) => {
        e.preventDefault();
        const entry = {
            dt: document.getElementById('dt').value,
            symptom: document.getElementById('symptom').value,
            severity: severity,
            location: document.getElementById('location').value,
            notes: document.getElementById('notes').value
        };

        data.unshift(entry);
        localStorage.setItem('symptoms', JSON.stringify(data));

        // Show success
        document.getElementById('msg').style.display = 'block';
        setTimeout(() => document.getElementById('msg').style.display = 'none', 2000);

        // Reset
        document.getElementById('symptom').value = '';
        document.getElementById('location').value = '';
        document.getElementById('notes').value = '';
        document.querySelectorAll('.sev-btn').forEach(b => b.classList.remove('active'));

        loadHistory();
        updateStats();
    };

    loadHistory();
    updateStats();
});

function showPage(page) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(page).classList.add('active');

    if(page === 'trends') updateChart();
    if(page === 'export') generateReport();
}

function loadHistory() {
    const list = document.getElementById('entries');
    if(!list) return;

    list.innerHTML = data.length ? '' : '<p style="text-align:center;color:#6c757d;padding:40px">No entries yet</p>';

    data.slice(0,20).forEach(e => {
        const d = new Date(e.dt);
        const cls = e.severity <= 3 ? 'mild' : e.severity <= 6 ? 'mod' : 'sev';

        list.innerHTML += `
            <div class="entry">
                <div style="display:flex;justify-content:space-between;margin-bottom:10px">
                    <strong>${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</strong>
                    <span class="badge ${cls}">Severity: ${e.severity}/10</span>
                </div>
                <div>${e.symptom}${e.location ? ` - ${e.location}` : ''}</div>
                ${e.notes ? `<div style="color:#6c757d;margin-top:5px">${e.notes}</div>` : ''}
            </div>
        `;
    });
}

function updateStats() {
    document.getElementById('total').textContent = data.length;

    if(data.length > 0) {
        const avg = data.reduce((sum, e) => sum + e.severity, 0) / data.length;
        document.getElementById('avg').textContent = avg.toFixed(1);

        const days = new Set(data.map(e => new Date(e.dt).toDateString())).size;
        document.getElementById('days').textContent = days;
    }
}

function updateChart() {
    const chart = document.getElementById('chart');
    chart.innerHTML = '';

    const days = [];
    for(let i = 6; i >= 0; i--) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        const dayData = data.filter(e => new Date(e.dt).toDateString() === date.toDateString());
        const avg = dayData.length ? dayData.reduce((sum, e) => sum + e.severity, 0) / dayData.length : 0;
        days.push(avg);
    }

    const max = Math.max(...days, 10);
    days.forEach(val => {
        const bar = document.createElement('div');
        bar.className = 'bar';
        bar.style.height = `${(val/max)*100}%`;
        bar.title = `Severity: ${val.toFixed(1)}`;
        chart.appendChild(bar);
    });
}

function generateReport() {
    const report = document.getElementById('report');
    if(data.length === 0) {
        report.innerHTML = '<p style="color:#6c757d">No data to export</p>';
        return;
    }

    const summary = `
        <h3>Summary Report</h3>
        <p><strong>Total Entries:</strong> ${data.length}</p>
        <p><strong>Date Range:</strong> ${new Date(data[data.length-1].dt).toLocaleDateString()} - ${new Date(data[0].dt).toLocaleDateString()}</p>
        <p><strong>Average Severity:</strong> ${(data.reduce((sum,e)=>sum+e.severity,0)/data.length).toFixed(1)}/10</p>
    `;
    report.innerHTML = summary;
}

function exportCSV() {
    let csv = 'Date,Time,Symptom,Severity,Location,Notes\n';
    data.forEach(e => {
        const d = new Date(e.dt);
        csv += `"${d.toLocaleDateString()}","${d.toLocaleTimeString()}","${e.symptom}","${e.severity}","${e.location}","${e.notes}"\n`;
    });
    download(csv, 'symptoms.csv', 'text/csv');
}

function exportJSON() {
    download(JSON.stringify(data, null, 2), 'symptoms.json', 'application/json');
}

function download(content, filename, type) {
    const blob = new Blob([content], {type});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
}

function printData() {
    window.print();
}
</script>
</body>
</html>
