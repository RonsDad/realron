<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #5C94FC, #8ED4FC);
            font-family: 'Courier New', monospace;
        }
        
        #gameContainer {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
        
        #gameCanvas {
            border: 3px solid #8B4513;
            background: linear-gradient(to bottom, #8ED4FC, #9BD1FC);
            display: block;
            margin: 0 auto;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }
        
        #gameStats {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
            padding: 10px;
            background: #333;
            color: white;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
        }
        
        .stat {
            padding: 5px 10px;
        }
        
        #controls {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            border-radius: 5px;
        }
        
        #gameOverScreen, #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            padding: 30px;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            border-radius: 10px;
            display: none;
        }
        
        #gameOverScreen.active, #startScreen.active {
            display: block;
        }
        
        button {
            padding: 10px 20px;
            font-size: 18px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        button:hover {
            background: #ff5252;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div id="gameStats">
            <div class="stat">Score: <span id="score">0</span></div>
            <div class="stat">Lives: <span id="lives">3</span></div>
            <div class="stat">Level: <span id="level">1</span></div>
        </div>
        <div id="controls">
            Use ARROW KEYS or WASD to move, SPACE to jump
        </div>
    </div>
    
    <div id="startScreen" class="active">
        <h1>Super Mario Clone</h1>
        <p>Collect coins and avoid enemies!</p>
        <button onclick="startGame()">Start Game</button>
    </div>
    
    <div id="gameOverScreen">
        <h1 id="gameOverText">Game Over!</h1>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game constants
        const GRAVITY = 0.5;
        const JUMP_FORCE = -12;
        const MOVE_SPEED = 5;
        const ENEMY_SPEED = 1;
        
        // Input handling
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === ' ') e.preventDefault();
        });
        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });
        
        // Base GameObject class
        class GameObject {
            constructor(x, y, width, height, color) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.color = color;
                this.vx = 0;
                this.vy = 0;
            }
            
            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }
            
            checkCollision(other) {
                return this.x < other.x + other.width &&
                       this.x + this.width > other.x &&
                       this.y < other.y + other.height &&
                       this.y + this.height > other.y;
            }
        }
        
        // Player class (Mario)
        class Player extends GameObject {
            constructor(x, y) {
                super(x, y, 30, 40, '#FF0000');
                this.jumpCount = 0;
                this.maxJumps = 2;
                this.isGrounded = false;
                this.facing = 1; // 1 for right, -1 for left
                this.invulnerable = false;
                this.invulnerableTime = 0;
            }
            
            update(platforms) {
                // Apply gravity
                this.vy += GRAVITY;
                
                // Handle input
                if (keys['arrowleft'] || keys['a']) {
                    this.vx = -MOVE_SPEED;
                    this.facing = -1;
                } else if (keys['arrowright'] || keys['d']) {
                    this.vx = MOVE_SPEED;
                    this.facing = 1;
                } else {
                    this.vx *= 0.8; // Friction
                }
                
                // Jump
                if ((keys[' '] || keys['arrowup'] || keys['w']) && this.jumpCount < this.maxJumps) {
                    if (!this.jumpPressed) {
                        this.vy = JUMP_FORCE;
                        this.jumpCount++;
                        this.jumpPressed = true;
                    }
                } else {
                    this.jumpPressed = false;
                }
                
                // Update position
                this.x += this.vx;
                this.y += this.vy;
                
                // Check platform collisions
                this.isGrounded = false;
                for (let platform of platforms) {
                    if (this.checkCollision(platform)) {
                        // Top collision (landing on platform)
                        if (this.vy > 0 && this.y < platform.y) {
                            this.y = platform.y - this.height;
                            this.vy = 0;
                            this.isGrounded = true;
                            this.jumpCount = 0;
                        }
                        // Bottom collision
                        else if (this.vy < 0 && this.y > platform.y) {
                            this.y = platform.y + platform.height;
                            this.vy = 0;
                        }
                        // Side collisions
                        else if (this.vx > 0 && this.x < platform.x) {
                            this.x = platform.x - this.width;
                            this.vx = 0;
                        } else if (this.vx < 0 && this.x > platform.x) {
                            this.x = platform.x + platform.width;
                            this.vx = 0;
                        }
                    }
                }
                
                // Keep player in bounds
                if (this.x < 0) this.x = 0;
                if (this.x > canvas.width - this.width) this.x = canvas.width - this.width;
                if (this.y > canvas.height) this.y = canvas.height - 100; // Respawn
                
                // Update invulnerability
                if (this.invulnerable) {
                    this.invulnerableTime--;
                    if (this.invulnerableTime <= 0) {
                        this.invulnerable = false;
                    }
                }
            }
            
            draw() {
                if (this.invulnerable && Math.floor(this.invulnerableTime / 5) % 2) {
                    return; // Blinking effect when invulnerable
                }
                
                // Draw Mario-like character
                ctx.fillStyle = '#FF0000'; // Red hat/shirt
                ctx.fillRect(this.x + 5, this.y, 20, 20);
                
                ctx.fillStyle = '#0000FF'; // Blue overalls
                ctx.fillRect(this.x + 5, this.y + 20, 20, 20);
                
                ctx.fillStyle = '#FFDBAC'; // Face
                ctx.fillRect(this.x + 8, this.y + 5, 14, 10);
                
                // Eyes
                ctx.fillStyle = '#000000';
                if (this.facing === 1) {
                    ctx.fillRect(this.x + 16, this.y + 8, 3, 3);
                } else {
                    ctx.fillRect(this.x + 11, this.y + 8, 3, 3);
                }
                
                // Mustache
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(this.x + 10, this.y + 12, 10, 2);
            }
            
            takeDamage() {
                if (!this.invulnerable) {
                    this.invulnerable = true;
                    this.invulnerableTime = 120; // 2 seconds at 60fps
                    return true;
                }
                return false;
            }
        }
        
        // Enemy class (Goomba)
        class Enemy extends GameObject {
            constructor(x, y) {
                super(x, y, 30, 30, '#8B4513');
                this.vx = ENEMY_SPEED * (Math.random() > 0.5 ? 1 : -1);
                this.patrolDistance = 100;
                this.startX = x;
            }
            
            update(platforms) {
                // Apply gravity
                this.vy += GRAVITY;
                
                // Move back and forth
                this.x += this.vx;
                this.y += this.vy;
                
                // Patrol behavior
                if (Math.abs(this.x - this.startX) > this.patrolDistance) {
                    this.vx *= -1;
                }
                
                // Platform collisions
                for (let platform of platforms) {
                    if (this.checkCollision(platform)) {
                        if (this.vy > 0 && this.y < platform.y) {
                            this.y = platform.y - this.height;
                            this.vy = 0;
                        }
                    }
                }
                
                // Screen bounds
                if (this.x < 0 || this.x > canvas.width - this.width) {
                    this.vx *= -1;
                }
            }
            
            draw() {
                // Draw Goomba-like enemy
                ctx.fillStyle = '#8B4513'; // Brown body
                ctx.fillRect(this.x, this.y + 10, 30, 20);
                
                // Head
                ctx.beginPath();
                ctx.arc(this.x + 15, this.y + 15, 15, 0, Math.PI * 2);
                ctx.fillStyle = '#A0522D';
                ctx.fill();
                
                // Eyes
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(this.x + 8, this.y + 10, 6, 6);
                ctx.fillRect(this.x + 16, this.y + 10, 6, 6);
                ctx.fillStyle = '#000000';
                ctx.fillRect(this.x + 10, this.y + 12, 2, 2);
                ctx.fillRect(this.x + 18, this.y + 12, 2, 2);
                
                // Feet
                ctx.fillStyle = '#654321';
                ctx.fillRect(this.x + 5, this.y + 28, 8, 5);
                ctx.fillRect(this.x + 17, this.y + 28, 8, 5);
            }
        }
        
        // Coin class
        class Coin extends GameObject {
            constructor(x, y) {
                super(x, y, 20, 20, '#FFD700');
                this.collected = false;
                this.rotation = 0;
            }
            
            update() {
                this.rotation += 0.1;
            }
            
            draw() {
                if (this.collected) return;
                
                ctx.save();
                ctx.translate(this.x + 10, this.y + 10);
                ctx.rotate(this.rotation);
                
                // Draw coin
                ctx.beginPath();
                ctx.arc(0, 0, 10, 0, Math.PI * 2);
                ctx.fillStyle = '#FFD700';
                ctx.fill();
                ctx.strokeStyle = '#FFA500';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Dollar sign
                ctx.fillStyle = '#FFA500';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('$', 0, 0);
                
                ctx.restore();
            }
        }
        
        // Platform class
        class Platform extends GameObject {
            constructor(x, y, width, height) {
                super(x, y, width, height, '#8B4513');
            }
            
            draw() {
                // Draw brick pattern
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                
                ctx.strokeStyle = '#654321';
                ctx.lineWidth = 1;
                
                // Draw brick lines
                for (let i = 0; i < this.width; i += 20) {
                    ctx.beginPath();
                    ctx.moveTo(this.x + i, this.y);
                    ctx.lineTo(this.x + i, this.y + this.height);
                    ctx.stroke();
                }
                
                for (let j = 0; j < this.height; j += 10) {
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y + j);
                    ctx.lineTo(this.x + this.width, this.y + j);
                    ctx.stroke();
                }
            }
        }
        
        // Game class
        class Game {
            constructor() {
                this.player = null;
                this.enemies = [];
                this.coins = [];
                this.platforms = [];
                this.score = 0;
                this.lives = 3;
                this.level = 1;
                this.gameRunning = false;
                this.animationId = null;
            }
            
            init() {
                // Create player
                this.player = new Player(50, 200);
                
                // Create platforms for level
                this.platforms = [
                    new Platform(0, 350, 800, 50),  // Ground
                    new Platform(150, 280, 100, 20),
                    new Platform(300, 220, 100, 20),
                    new Platform(450, 280, 100, 20),
                    new Platform(600, 200, 100, 20),
                    new Platform(50, 150, 80, 20),
                    new Platform(700, 130, 80, 20)
                ];
                
                // Create enemies
                this.enemies = [
                    new Enemy(200, 100),
                    new Enemy(400, 100),
                    new Enemy(600, 100)
                ];
                
                // Create coins
                this.coins = [
                    new Coin(180, 240),
                    new Coin(330, 180),
                    new Coin(480, 240),
                    new Coin(630, 160),
                    new Coin(80, 110),
                    new Coin(730, 90),
                    new Coin(250, 300),
                    new Coin(550, 300)
                ];
                
                this.updateUI();
            }
            
            update() {
                if (!this.gameRunning) return;
                
                // Update player
                this.player.update(this.platforms);
                
                // Update enemies
                this.enemies.forEach(enemy => enemy.update(this.platforms));
                
                // Update coins
                this.coins.forEach(coin => coin.update());
                
                // Check enemy collisions
                this.enemies.forEach((enemy, index) => {
                    if (this.player.checkCollision(enemy)) {
                        // Check if player is jumping on enemy
                        if (this.player.vy > 0 && this.player.y < enemy.y) {
                            // Bounce off enemy
                            this.player.vy = JUMP_FORCE / 2;
                            this.enemies.splice(index, 1);
                            this.score += 100;
                        } else {
                            // Take damage
                            if (this.player.takeDamage()) {
                                this.lives--;
                                if (this.lives <= 0) {
                                    this.gameOver();
                                }
                            }
                        }
                    }
                });
                
                // Check coin collection
                this.coins.forEach(coin => {
                    if (!coin.collected && this.player.checkCollision(coin)) {
                        coin.collected = true;
                        this.score += 50;
                    }
                });
                
                // Check if all coins collected
                if (this.coins.every(coin => coin.collected)) {
                    this.nextLevel();
                }
                
                // Check if player fell off
                if (this.player.y > canvas.height) {
                    this.lives--;
                    if (this.lives <= 0) {
                        this.gameOver();
                    } else {
                        this.player.x = 50;
                        this.player.y = 200;
                        this.player.vx = 0;
                        this.player.vy = 0;
                    }
                }
                
                this.updateUI();
            }
            
            draw() {
                // Clear canvas with sky gradient
                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, '#87CEEB');
                gradient.addColorStop(1, '#98D8E8');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw clouds
                this.drawClouds();
                
                // Draw game objects
                this.platforms.forEach(platform => platform.draw());
                this.coins.forEach(coin => coin.draw());
                this.enemies.forEach(enemy => enemy.draw());
                this.player.draw();
            }
            
            drawClouds() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                
                // Cloud 1
                this.drawCloud(100, 50, 40);
                
                // Cloud 2
                this.drawCloud(300, 80, 30);
                
                // Cloud 3
                this.drawCloud(500, 40, 35);
                
                // Cloud 4
                this.drawCloud(700, 70, 40);
            }
            
            drawCloud(x, y, size) {
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.arc(x + size, y, size * 0.8, 0, Math.PI * 2);
                ctx.arc(x - size, y, size * 0.8, 0, Math.PI * 2);
                ctx.arc(x + size/2, y - size/2, size * 0.7, 0, Math.PI * 2);
                ctx.arc(x - size/2, y - size/2, size * 0.7, 0, Math.PI * 2);
                ctx.fill();
            }
            
            gameLoop() {
                this.update();
                this.draw();
                this.animationId = requestAnimationFrame(() => this.gameLoop());
            }
            
            start() {
                this.gameRunning = true;
                this.init();
                this.gameLoop();
            }
            
            pause() {
                this.gameRunning = false;
                cancelAnimationFrame(this.animationId);
            }
            
            gameOver() {
                this.gameRunning = false;
                cancelAnimationFrame(this.animationId);
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('gameOverScreen').classList.add('active');
            }
            
            nextLevel() {
                this.level++;
                this.score += 500; // Level completion bonus
                
                // Reset positions and add more enemies for next level
                this.player.x = 50;
                this.player.y = 200;
                this.player.vx = 0;
                this.player.vy = 0;
                
                // Add more enemies
                this.enemies.push(new Enemy(150 + Math.random() * 500, 100));
                if (this.level > 2) {
                    this.enemies.push(new Enemy(150 + Math.random() * 500, 100));
                }
                
                // Reset coins
                this.coins.forEach(coin => coin.collected = false);
                
                // Add some random new coins
                for (let i = 0; i < 2; i++) {
                    this.coins.push(new Coin(
                        50 + Math.random() * 700,
                        50 + Math.random() * 200
                    ));
                }
                
                this.updateUI();
            }
            
            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('lives').textContent = this.lives;
                document.getElementById('level').textContent = this.level;
            }
        }
        
        // Game instance
        let game = new Game();
        
        function startGame() {
            document.getElementById('startScreen').classList.remove('active');
            game = new Game();
            game.start();
        }
        
        function restartGame() {
            document.getElementById('gameOverScreen').classList.remove('active');
            game = new Game();
            game.start();
        }
        
        // Pause/Resume with ESC key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && game.gameRunning) {
                if (game.gameRunning) {
                    game.pause();
                } else {
                    game.gameRunning = true;
                    game.gameLoop();
                }
            }
        });
    </script>
</body>
</html>
